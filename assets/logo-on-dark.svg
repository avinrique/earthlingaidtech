<svg width="100%" viewBox="0 0 690 690" role="img" xmlns="http://www.w3.org/2000/svg" style="">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Earthling Aid Tech cube logo</title>
  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Three nested isometric cubes with soft edges creating depth</desc>

  <rect width="680" height="680" fill="#0D0D0D" style="fill:rgb(13, 13, 13);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <g transform="translate(340,330)" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">

    <!-- Outer cube R=148 -->
    <polygon points="0,-148 128,-74 0,0 -128,-74" fill="#2E2E2E" stroke="#0D0D0D" stroke-width="7" stroke-linejoin="round" style="fill:rgb(46, 46, 46);stroke:rgb(13, 13, 13);color:rgb(255, 255, 255);stroke-width:7px;stroke-linecap:butt;stroke-linejoin:round;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <polygon points="128,-74 128,74 0,148 0,0" fill="#1C1C1C" stroke="#0D0D0D" stroke-width="7" stroke-linejoin="round" style="fill:rgb(28, 28, 28);stroke:rgb(13, 13, 13);color:rgb(255, 255, 255);stroke-width:7px;stroke-linecap:butt;stroke-linejoin:round;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <polygon points="-128,-74 0,0 0,148 -128,74" fill="#111111" stroke="#0D0D0D" stroke-width="7" stroke-linejoin="round" style="fill:rgb(17, 17, 17);stroke:rgb(13, 13, 13);color:rgb(255, 255, 255);stroke-width:7px;stroke-linecap:butt;stroke-linejoin:round;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

    <!-- Middle cube R=92 -->
    <polygon points="0,-92 80,-46 0,0 -80,-46" fill="#606060" stroke="#0D0D0D" stroke-width="7" stroke-linejoin="round" style="fill:rgb(96, 96, 96);stroke:rgb(13, 13, 13);color:rgb(255, 255, 255);stroke-width:7px;stroke-linecap:butt;stroke-linejoin:round;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <polygon points="80,-46 80,46 0,92 0,0" fill="#424242" stroke="#0D0D0D" stroke-width="7" stroke-linejoin="round" style="fill:rgb(66, 66, 66);stroke:rgb(13, 13, 13);color:rgb(255, 255, 255);stroke-width:7px;stroke-linecap:butt;stroke-linejoin:round;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <polygon points="-80,-46 0,0 0,92 -80,46" fill="#2A2A2A" stroke="#0D0D0D" stroke-width="7" stroke-linejoin="round" style="fill:rgb(42, 42, 42);stroke:rgb(13, 13, 13);color:rgb(255, 255, 255);stroke-width:7px;stroke-linecap:butt;stroke-linejoin:round;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

    <!-- Inner cube R=40 -->
    <polygon points="0,-40 35,-20 0,0 -35,-20" fill="#C8C8C8" stroke="#0D0D0D" stroke-width="7" stroke-linejoin="round" style="fill:rgb(200, 200, 200);stroke:rgb(13, 13, 13);color:rgb(255, 255, 255);stroke-width:7px;stroke-linecap:butt;stroke-linejoin:round;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <polygon points="35,-20 35,20 0,40 0,0" fill="#A0A0A0" stroke="#0D0D0D" stroke-width="7" stroke-linejoin="round" style="fill:rgb(160, 160, 160);stroke:rgb(13, 13, 13);color:rgb(255, 255, 255);stroke-width:7px;stroke-linecap:butt;stroke-linejoin:round;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <polygon points="-35,-20 0,0 0,40 -35,20" fill="#747474" stroke="#0D0D0D" stroke-width="7" stroke-linejoin="round" style="fill:rgb(116, 116, 116);stroke:rgb(13, 13, 13);color:rgb(255, 255, 255);stroke-width:7px;stroke-linecap:butt;stroke-linejoin:round;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  </g>

</svg>